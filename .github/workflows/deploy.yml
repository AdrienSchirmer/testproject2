name: DinahostingDeploy

on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Fa un git clone de la branca que ha generat l'acció a la màquina ubuntu
      - uses: actions/checkout@v4
      # Instal·la el php
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, pdo_mysql, tokenizer, xml, zip, zlib, ctype, openssl, fileinfo, bcmath
      # Fa un git clone de la branca que ha generat l'acció a la màquina ubuntu
      - uses: actions/checkout@v4
      # Instal·la les dependències de php
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      # Instal·la el Node JS
      - name: Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 20
      # Instal·la les dependències Node.js
      - name: Instal·la les dependències de Node JS
        run: npm install
      # Compila el Vue
      - name: Compila vue.js
        run: npm run build
      - name: Fent neteja
        run: rm -rf node_modules
      # - name: Esborrar la carpeta storage
      #   run: rm -rf storage
      - name: Comprimir el projecte  (incloent els ocults)
        run: tar -czf app.tgz $(ls -A)
      - name: Envia app.tgz al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          source: 'app.tgz'
          target: ${{ secrets.DOCUMENT_ROOT }}
      - name: Es connecta per ssh per fer el desplegament
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            echo "Descomprimint el fitxer app.tgz"
            cd ${{ secrets.DOCUMENT_ROOT }}
            tar -xzf app.tgz
            pwd
            ls -lisa
            echo "Copiar el fitxer env si no el tenim"
            [ -f .env ] || cp .env.example .env

            DB_CONNECTION_VALUE="${{ secrets.DB_CONNECTION }}"
            DB_HOST_VALUE="${{ secrets.DB_HOST }}"
            DB_PORT_VALUE="${{ secrets.DB_PORT }}"
            DB_DATABASE_VALUE="${{ secrets.DB_DB }}"
            DB_USERNAME_VALUE="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD_VALUE="${{ secrets.DB_PASSWORD }}"

            if [ -z "$DB_CONNECTION_VALUE" ]; then DB_CONNECTION_VALUE="mysql"; fi

            if [ -z "$DB_HOST_VALUE" ] || [ -z "$DB_PORT_VALUE" ] || [ -z "$DB_DATABASE_VALUE" ] || [ -z "$DB_USERNAME_VALUE" ] || [ -z "$DB_PASSWORD_VALUE" ]; then
              echo "Missing one or more DB secrets: DB_HOST, DB_PORT, DB_DB, DB_USERNAME, DB_PASSWORD"
              exit 1
            fi

            set_env_var() {
              key="$1"
              value="$2"
              grep -v "^${key}=" .env > .env.tmp || true
              mv .env.tmp .env
              printf '%s=%s\n' "$key" "$value" >> .env
            }

            echo "Canvia el fitxer env"
            set_env_var "DB_CONNECTION" "$DB_CONNECTION_VALUE"
            set_env_var "DB_HOST" "$DB_HOST_VALUE"
            set_env_var "DB_PORT" "$DB_PORT_VALUE"
            set_env_var "DB_DATABASE" "$DB_DATABASE_VALUE"
            set_env_var "DB_USERNAME" "$DB_USERNAME_VALUE"
            # Quote password to avoid dotenv parsing issues with special chars (#, spaces, etc.).
            set_env_var "DB_PASSWORD" "\"$DB_PASSWORD_VALUE\""

            export DB_CONNECTION_VALUE DB_HOST_VALUE DB_PORT_VALUE DB_DATABASE_VALUE DB_USERNAME_VALUE DB_PASSWORD_VALUE
            $(which php84) -r '
              $driver = getenv("DB_CONNECTION_VALUE") ?: "mysql";
              $dsn = sprintf(
                "%s:host=%s;port=%s;dbname=%s",
                $driver,
                getenv("DB_HOST_VALUE"),
                getenv("DB_PORT_VALUE"),
                getenv("DB_DATABASE_VALUE")
              );
              try {
                new PDO($dsn, getenv("DB_USERNAME_VALUE"), getenv("DB_PASSWORD_VALUE"), [PDO::ATTR_TIMEOUT => 5]);
                echo "DB connection test: OK\n";
              } catch (Throwable $e) {
                fwrite(STDERR, "DB connection test failed: " . $e->getMessage() . "\n");
                exit(1);
              }
            '
            $(which php84) artisan config:clear
            $(which php84) artisan key:generate
            echo "Executar migracions, cache i altres operacions de Laravel"
            $(which php84) artisan migrate --force
            $(which php84) artisan optimize:clear
            $(which php84) artisan optimize
            $(which php84) artisan storage:unlink
            $(which php84) artisan storage:link
