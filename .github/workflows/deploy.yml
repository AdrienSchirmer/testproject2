name: DinahostingDeploy

on:
  push:
    branches: ['develop']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Fa un git clone de la branca que ha generat l'acció a la màquina ubuntu
      - uses: actions/checkout@v4
      # Instal·la el php
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, pdo_mysql, tokenizer, xml, zip, zlib, ctype, openssl, fileinfo, bcmath
      # Fa un git clone de la branca que ha generat l'acció a la màquina ubuntu
      - uses: actions/checkout@v4
      # Instal·la les dependències de php
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      # Instal·la el Node JS
      - name: Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 20
      # Instal·la les dependències Node.js
      - name: Instal·la les dependències de Node JS
        run: npm install
      # Compila el Vue
      - name: Compila vue.js
        run: npm run build
      - name: Fent neteja
        run: rm -rf node_modules
      # - name: Esborrar la carpeta storage
      #   run: rm -rf storage
      - name: Comprimir el projecte  (incloent els ocults)
        run: tar -czf app.tgz $(ls -A)
      - name: Envia app.tgz al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          source: 'app.tgz'
          target: ${{ secrets.DOCUMENT_ROOT }}
      - name: Es connecta per ssh per fer el desplegament
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Descomprimint el fitxer app.tgz"
            cd ${{ secrets.DOCUMENT_ROOT }}
            tar -xzf app.tgz
            pwd
            ls -lisa
            echo "Copiar el fitxer env si no el tenim"
            [ -f .env ] || cp .env.example .env
            echo "Canvia el fitxer env"
            sed -i "s/DB_CONNECTION=mysql/DB_CONNECTION=${{ secrets.DB_CONNECTION }}/g" .env
            sed -i "s/DB_HOST=127.0.0.1/DB_HOST=${{ secrets.DB_HOST }}/g" .env
            sed -i "s/DB_PORT=3306/DB_PORT=${{ secrets.DB_PORT }}/g" .env
            sed -i "s/DB_DATABASE=db/DB_DATABASE=${{ secrets.DB_DB }}/g" .env
            sed -i "s/DB_USERNAME=user/DB_USERNAME=${{ secrets.DB_USERNAME }}/g" .env
            sed -i "s/DB_PASSWORD=pwrd/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/g" .env
            $(which php84) artisan config:clear
            $(which php84) artisan key:generate
            echo "Executar migracions, cache i altres operacions de Laravel"
            $(which php84) artisan migrate --force
            $(which php84) artisan optimize:clear
            $(which php84) artisan optimize
            $(which php84) artisan storage:unlink
            $(which php84) artisan storage:link
